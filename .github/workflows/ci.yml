name: CI
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs for the same branch on a new push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------
  # REUSE/SPDX compliance — every tracked file must carry copyright +
  # licence info (inline header or REUSE.toml annotation).
  # -------------------------------------------------------------------
  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@v6

  # -------------------------------------------------------------------
  # pre-commit lints (whitespace, shellcheck, cmake-format/lint, reuse).
  # qmllint runs in build-and-test where Qt is available.
  # -------------------------------------------------------------------
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  # -------------------------------------------------------------------
  # Build the C++ plugin + the test suite against KDE Neon's bleeding
  # edge Plasma 6 image, then run every CTest target headless.
  #
  # kdeneon/plasma:unstable is the only mainstream image that ships a
  # working combination of Qt 6.7+, KF6, plasma-workspace and qt6-
  # webengine-dev. Pinned by content digest so upstream image churn
  # can't break CI silently — bump via:
  #
  #     docker pull kdeneon/plasma:unstable
  #     docker inspect --format='{{.RepoDigests}}' kdeneon/plasma:unstable
  #
  # and paste the new sha256:… into the `image:` line.
  # -------------------------------------------------------------------
  build-and-test:
    name: Build + test (kdeneon/plasma)
    runs-on: ubuntu-latest
    container:
      image: kdeneon/plasma@sha256:4acf25665f68afc71bfdbca6c6c775664f78af23f6b3965c5759e37521e85e5c
      options: --user 0:0 --security-opt apparmor=unconfined
    env:
      QT_QPA_PLATFORM: offscreen
      # WebEngine can't use Chromium's setuid sandbox inside the
      # container (no user namespaces); disable it. Software-rendered
      # so the offscreen platform doesn't try to acquire a GL context.
      QTWEBENGINE_DISABLE_SANDBOX: "1"
      QTWEBENGINE_CHROMIUM_FLAGS: "--no-sandbox --disable-gpu --disable-dev-shm-usage"
      QT_QUICK_BACKEND: software
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - name: Install build + test deps
        # `full-upgrade` first: the pinned kdeneon/plasma image carries
        # libgpgmepp6 1.16 / libharfbuzz0b 2.7 / libgdk-pixbuf 2.36 from
        # jammy main, but neon's unstable repo has since moved kf6-kwallet
        # and friends to libgpgmepp6 >= 1.23, harfbuzz 6.x, etc.  Without
        # a full upgrade, the targeted `apt-get install` below hits
        # "unmet dependencies: kf6-kwallet : Depends: libgpgmepp6 (>= 1.23.2)
        # but 1.16.0-1.2ubuntu4.2 is to be installed" and exits 100 before
        # CMake ever runs.  Upgrading the neon-rebased base packages
        # resolves the libjpeg-dev / libgdk-pixbuf-2.0-dev / libharfbuzz-dev
        # / libgpgmepp6 conflicts in one pass.
        #
        # `--allow-downgrades` on the install step: after the full-upgrade,
        # harfbuzz0b / libjpeg-turbo8 / libraqm0 are at neon-unstable's
        # newer rebase, but jammy-main's `libharfbuzz-dev` / `libjpeg-dev`
        # (pulled in transitively by qt6-webengine-dev → libcupsimage2-dev /
        # libtiff-dev / libgtk-3-dev) depend on the older versions, so apt
        # wants to step those runtime libs back down to match. Without the
        # flag apt exits 100 with "Packages were downgraded and -y was used
        # without --allow-downgrades".
        run: |
          apt-get update
          apt-get -y full-upgrade
          apt-get install -y --no-install-recommends --allow-downgrades \
            cmake extra-cmake-modules gettext ccache \
            libkf6wallet-dev libkf6kcmutils-dev libkf6coreaddons-dev \
            libkf6i18n-dev libkf6package-dev libplasma-dev \
            qt6-webengine-dev qt6-webengine-dev-tools \
            nodejs npm \
            python3-dbusmock python3-dbus \
            xvfb

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Debug
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure --schedule-random -j$(nproc)

      - name: Upload CTest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs
          path: build/Testing/
          if-no-files-found: ignore
