#
# Pre-commit hooks. Run locally with `pre-commit install && pre-commit run --all-files`.
# CI runs the same hooks via the `lint` job.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://codeberg.org/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # cmake-format is intentionally omitted: every config setting we tried
  # rewrote the codebase's grouped/column-aligned `ecm_add_test` and
  # `qt_add_qml_module` blocks into either one-arg-per-line stacks or
  # 200-col single-line walls. cmake-lint catches the real bugs (long
  # lines, missing docstrings) and respects the local .cmake-format.py
  # config without touching file contents.
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-lint
